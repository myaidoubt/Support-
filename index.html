<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0c" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Audiq" />
<title>Audiq</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --line: #e4e4e4;
    --ink: #0a0a0c;
    --ink-soft: #45454c;
    --ink-faint: #8a8a92;
    --accent: #F2A03D;
    --gold: #F2A03D;
    --accent-text: #0a0a0c;
    --danger: #e94b3c;
    --font-display: 'Sora', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    min-height: 580px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button { font-family: inherit; }
  p, h1, h2, h3 { font-weight: 700; }

  .mp-phone {
    width: 100%;
    max-width: 430px;
    height: 100%;
    max-height: 900px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  @media (min-width: 540px) {
    .mp-phone {
      border-radius: 32px;
      box-shadow: 0 24px 60px -20px rgba(0,0,0,0.25);
      border: 1px solid var(--line);
    }
  }

  .mp-screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .mp-screen.hidden { display: none; }

  /* ---------- Shared top bars ---------- */

  .mp-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 22px 16px; flex-shrink: 0;
  }
  .mp-topbar-title {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 26px;
    letter-spacing: -0.01em;
    margin: 0;
    color: var(--ink);
  }
  .mp-icon-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink);
    cursor: pointer;
    flex-shrink: 0;
  }
  .mp-icon-btn:hover { background: var(--bg); }
  .mp-icon-btn:active { transform: scale(0.94); }

  /* ---------- Discover screen ---------- */

  .mp-discover-header { padding: 22px 22px 0; flex-shrink: 0; }
  .mp-discover-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }

  .mp-tabs { display: flex; gap: 22px; border-bottom: 1.5px solid var(--line); overflow-x: auto; scrollbar-width: none; }
  .mp-tabs::-webkit-scrollbar { display: none; }
  .mp-tab {
    background: none; border: none; padding: 0 0 12px;
    font-size: 14.5px; font-weight: 700; color: var(--ink-faint);
    cursor: pointer; position: relative;
  }
  .mp-tab.active { color: var(--ink); }
  .mp-tab.active::after {
    content: ""; position: absolute; left: 0; bottom: -1.5px;
    width: 100%; height: 2.5px; background: var(--gold); border-radius: 2px;
  }

  .mp-scroll { flex: 1; overflow-y: auto; padding: 20px 22px 16px; }

  .mp-section-title {
    font-family: var(--font-display); font-weight: 800; font-size: 18px;
    margin: 0 0 14px; color: var(--ink);
  }

  .mp-popular-row {
    display: flex; gap: 14px; overflow-x: auto;
    margin: 0 -22px 30px; padding: 0 22px 4px;
    scrollbar-width: none;
  }
  .mp-popular-row::-webkit-scrollbar { display: none; }

  .mp-popular-card {
    flex-shrink: 0; width: 152px; height: 170px;
    border-radius: 18px; padding: 14px;
    position: relative; overflow: hidden;
    color: #fff; cursor: pointer;
    display: flex; flex-direction: column; justify-content: flex-end;
    border: none; text-align: left;
  }
  .mp-popular-card::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 35%, rgba(0,0,0,0.55) 100%);
  }
  .mp-popular-name {
    font-family: var(--font-display); font-weight: 800; font-size: 14px;
    margin: 0 0 8px; position: relative; z-index: 1; line-height: 1.25;
    text-shadow: 0 1px 6px rgba(0,0,0,0.25);
  }
  .mp-popular-meta { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
  .mp-popular-stats { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.9); }
  .mp-popular-play {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,0.95);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink); flex-shrink: 0;
  }

  .mp-track-list { display: flex; flex-direction: column; gap: 2px; }

  .mp-track-row {
    display: flex; align-items: center; gap: 13px; padding: 9px 4px;
    background: none; border: none; border-radius: 10px;
    width: 100%; text-align: left; cursor: pointer; color: var(--ink);
  }
  .mp-track-row:hover { background: var(--bg); }
  .mp-track-art {
    width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .mp-track-row.playing .mp-track-art::after {
    content: ""; position: absolute; inset: 0; border-radius: 12px;
    background: rgba(0,0,0,0.3);
  }
  .mp-mini-eq { position: absolute; z-index: 1; display: flex; gap: 2px; align-items: flex-end; height: 13px; }
  .mp-mini-eq span { width: 3px; background: #fff; border-radius: 1px; animation: eqbounce 0.9s ease-in-out infinite; }
  .mp-mini-eq span:nth-child(1) { animation-delay: -0.6s; }
  .mp-mini-eq span:nth-child(2) { animation-delay: -0.3s; }
  .mp-mini-eq span:nth-child(3) { animation-delay: 0s; }
  .mp-mini-eq.paused span { animation-play-state: paused; height: 3px; }
  @keyframes eqbounce { 0%, 100% { height: 3px; } 50% { height: 12px; } }

  .mp-track-info { flex: 1; min-width: 0; }
  .mp-track-title {
    font-size: 14.5px; font-weight: 700; margin: 0; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mp-track-meta { font-family: var(--font-mono); font-size: 11.5px; font-weight: 600; color: var(--ink-faint); margin: 2px 0 0; }
  .mp-track-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  .mp-track-iconbtn { background: none; border: none; color: var(--ink-faint); cursor: pointer; padding: 6px; display: flex; }
  .mp-track-iconbtn:hover { color: var(--ink); }
  .mp-track-iconbtn.liked { color: var(--danger); }
  .mp-empty-state {
    color: var(--ink-soft); font-size: 14px; font-weight: 600;
    text-align: center; padding: 50px 20px; line-height: 1.5;
  }
  .mp-empty-state strong { display: block; font-size: 16px; color: var(--ink); margin-bottom: 6px; }

  .mp-group-block { margin-bottom: 26px; }
  .mp-group-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .mp-group-cover { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; background-size: cover; background-position: center; }
  .mp-group-cover.mosaic { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; overflow: hidden; background: none; }
  .mp-group-cover.mosaic span { display: block; background-size: cover; background-position: center; }
  .mp-group-title { font-family: var(--font-display); font-weight: 800; font-size: 15.5px; color: var(--ink); margin: 0; }
  .mp-group-sub { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--ink-faint); margin: 1px 0 0; }

  /* ---------- Online tab (Jamendo streaming) ---------- */

  .mp-online-search {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 11px 14px; margin: 0 0 14px;
  }
  .mp-online-search input {
    flex: 1; border: none; background: none; outline: none;
    font-family: var(--font-body); font-size: 15px; font-weight: 600; color: var(--ink);
  }
  .mp-online-search input::placeholder { color: var(--ink-faint); font-weight: 600; }
  .mp-online-search svg { color: var(--ink-faint); flex-shrink: 0; }
  .mp-online-search button {
    background: var(--gold); color: #0a0a0c; border: none; border-radius: 9px;
    padding: 7px 13px; font-size: 12.5px; font-weight: 700; cursor: pointer; flex-shrink: 0;
  }

  .mp-online-note {
    font-size: 11.5px; font-weight: 600; color: var(--ink-faint);
    margin: 0 0 16px; line-height: 1.5;
  }
  .mp-online-note a { color: var(--accent); text-decoration: none; font-weight: 700; }

  .mp-online-badge {
    font-family: var(--font-mono); font-size: 9.5px; font-weight: 700;
    color: var(--accent); background: rgba(46,94,170,0.1);
    padding: 2px 6px; border-radius: 5px; letter-spacing: 0.04em;
    flex-shrink: 0; margin-left: 6px;
  }

  .mp-online-status {
    text-align: center; padding: 40px 20px; color: var(--ink-soft);
    font-size: 14px; font-weight: 600; line-height: 1.5;
  }
  .mp-online-spinner {
    width: 26px; height: 26px; border-radius: 50%;
    border: 3px solid var(--line); border-top-color: var(--accent);
    margin: 0 auto 14px; animation: mp-spin 0.8s linear infinite;
  }
  @keyframes mp-spin { to { transform: rotate(360deg); } }

  /* ---------- Search screen ---------- */

  .mp-search-box {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 11px 14px; margin: 0 22px 18px;
  }
  .mp-search-box input {
    flex: 1; border: none; background: none; outline: none;
    font-family: var(--font-body); font-size: 15px; font-weight: 600; color: var(--ink);
  }
  .mp-search-box input::placeholder { color: var(--ink-faint); font-weight: 600; }
  .mp-search-box svg { color: var(--ink-faint); flex-shrink: 0; }
  .mp-search-clear { background: none; border: none; color: var(--ink-faint); cursor: pointer; display: flex; padding: 2px; }

  /* ---------- Library screen ---------- */

  .mp-lib-tabs { display: flex; gap: 10px; padding: 0 22px 18px; flex-shrink: 0; }
  .mp-lib-tab {
    background: var(--bg); border: 1.5px solid var(--line); border-radius: 20px;
    padding: 8px 16px; font-size: 13.5px; font-weight: 700; color: var(--ink-soft);
    cursor: pointer;
  }
  .mp-lib-tab.active { background: var(--gold); color: #0a0a0c; border-color: var(--gold); }

  .mp-playlist-card {
    display: flex; align-items: center; gap: 13px; padding: 10px 4px;
    background: none; border: none; border-radius: 10px;
    width: 100%; text-align: left; cursor: pointer; color: var(--ink);
  }
  .mp-playlist-card:hover { background: var(--bg); }
  .mp-playlist-cover {
    width: 50px; height: 50px; border-radius: 12px; flex-shrink: 0;
    display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
    overflow: hidden;
  }
  .mp-playlist-cover span { display: block; }
  .mp-playlist-cover.empty { background: var(--line); display: flex; align-items: center; justify-content: center; color: var(--ink-faint); }
  .mp-playlist-info { flex: 1; min-width: 0; }
  .mp-playlist-name { font-size: 15px; font-weight: 700; margin: 0; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mp-playlist-meta { font-family: var(--font-mono); font-size: 11.5px; font-weight: 600; color: var(--ink-faint); margin: 2px 0 0; }
  .mp-playlist-delete { background: none; border: none; color: var(--ink-faint); cursor: pointer; padding: 8px; flex-shrink: 0; }
  .mp-playlist-delete:hover { color: var(--danger); }

  .mp-new-playlist-btn {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 12px 4px; margin-bottom: 6px;
    background: none; border: none; cursor: pointer; text-align: left;
  }
  .mp-new-playlist-icon {
    width: 50px; height: 50px; border-radius: 12px; flex-shrink: 0;
    background: var(--bg); border: 1.5px dashed var(--ink-faint);
    display: flex; align-items: center; justify-content: center; color: var(--ink);
  }
  .mp-new-playlist-label { font-size: 15px; font-weight: 700; color: var(--ink); }

  /* ---------- Create / playlist editor screen ---------- */

  .mp-create-name {
    margin: 0 22px 18px;
  }
  .mp-create-name input {
    width: 100%; border: none; border-bottom: 2.5px solid var(--ink);
    background: none; outline: none; padding: 6px 2px;
    font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--ink);
  }
  .mp-create-name input::placeholder { color: var(--ink-faint); }
  .mp-create-sub { padding: 0 22px; margin: 0 0 6px; font-size: 12.5px; font-weight: 700; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.06em; }

  .mp-create-track-row { display: flex; align-items: center; gap: 13px; padding: 9px 22px; cursor: pointer; }
  .mp-create-checkbox {
    width: 22px; height: 22px; border-radius: 7px; border: 2px solid var(--line);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    cursor: pointer; color: transparent; background: var(--surface);
  }
  .mp-create-checkbox.checked { background: var(--gold); border-color: var(--gold); color: #0a0a0c; }
  .mp-create-track-row .mp-track-art { width: 40px; height: 40px; }
  .mp-create-track-row .mp-track-info { flex: 1; min-width: 0; }

  .mp-create-footer {
    flex-shrink: 0; padding: 14px 22px calc(14px + env(safe-area-inset-bottom));
    border-top: 1.5px solid var(--line); background: var(--surface);
  }
  .mp-btn-primary {
    width: 100%; padding: 14px; border-radius: 14px; border: none;
    background: var(--gold); color: #0a0a0c; font-size: 15px; font-weight: 800;
    cursor: pointer; font-family: var(--font-display);
  }
  .mp-btn-primary:disabled { background: var(--line); color: var(--ink-faint); cursor: not-allowed; }
  .mp-btn-primary:active:not(:disabled) { transform: scale(0.98); }

  /* ---------- Playlist detail screen ---------- */

  .mp-pd-header {
    padding: 16px 22px 20px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px;
  }
  .mp-pd-toprow { display: flex; align-items: center; justify-content: space-between; }
  .mp-pd-cover {
    width: 100%; aspect-ratio: 2.4; border-radius: 16px; overflow: hidden;
    display: grid; grid-auto-flow: column; grid-template-rows: 1fr 1fr;
  }
  .mp-pd-cover.empty { display: flex; align-items: center; justify-content: center; background: var(--bg); color: var(--ink-faint); }
  .mp-pd-title { font-family: var(--font-display); font-weight: 800; font-size: 24px; margin: 4px 0 0; color: var(--ink); }
  .mp-pd-meta { font-size: 13px; font-weight: 700; color: var(--ink-faint); margin: 2px 0 0; }
  .mp-pd-controls { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
  .mp-pd-play-btn {
    width: 50px; height: 50px; border-radius: 50%; background: var(--gold); color: #0a0a0c;
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .mp-pd-shuffle-btn {
    width: 50px; height: 50px; border-radius: 50%; background: var(--surface);
    border: 1.5px solid var(--line); color: var(--ink-soft); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .mp-pd-shuffle-btn.active { background: var(--gold); color: #0a0a0c; border-color: var(--gold); }

  /* ---------- Now Playing screen ---------- */

  .mp-player-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 18px; flex-shrink: 0; }
  .mp-player-header-title { font-size: 14px; font-weight: 800; letter-spacing: 0.02em; color: var(--ink); }

  .mp-player-body { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 32px 0; overflow-y: auto; }

  .mp-cover {
    width: 230px; height: 230px; border-radius: 24px; margin: 18px 0 28px;
    position: relative; overflow: hidden; flex-shrink: 0;
    background-size: cover; background-position: center;
    box-shadow: 0 18px 36px -14px rgba(0,0,0,0.35);
  }


  .mp-now-title { font-family: var(--font-display); font-weight: 800; font-size: 21px; text-align: center; margin: 0 0 4px; color: var(--ink); }
  .mp-now-artist { font-size: 14px; font-weight: 700; color: var(--ink-soft); text-align: center; margin: 0 0 26px; }

  .mp-waveform { width: 100%; display: flex; align-items: center; gap: 1.5px; height: 38px; cursor: pointer; flex-shrink: 0; }
  .mp-waveform span { flex: 1; border-radius: 2px; background: var(--line); transition: background 0.05s linear, transform 0.12s ease; transform-origin: center; }
  .mp-waveform span.filled { background: var(--accent); }
  .mp-waveform span.live { transform: scaleY(1.18); background: var(--gold); }

  .mp-time-row { width: 100%; display: flex; justify-content: space-between; margin: 8px 0 26px; font-family: var(--font-mono); font-size: 11.5px; font-weight: 700; color: var(--ink-faint); flex-shrink: 0; }

  .mp-transport { display: flex; align-items: center; justify-content: center; gap: 26px; margin-bottom: 16px; flex-shrink: 0; }
  .mp-transport button { background: none; border: none; color: var(--ink); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 6px; }
  .mp-shuffle-toggle.active { color: var(--accent); }
  .mp-play-btn { width: 58px; height: 58px; border-radius: 50%; background: var(--gold) !important; color: #0a0a0c !important; }
  .mp-play-btn:hover { background: #e0922a !important; }

  .mp-now-actions { display: flex; gap: 28px; margin-bottom: 4px; flex-shrink: 0; }
  .mp-now-actions button { background: none; border: none; color: var(--ink-faint); cursor: pointer; padding: 6px; }
  .mp-now-actions button.liked { color: var(--danger); }
  .mp-now-actions button:hover { color: var(--ink); }
  .mp-now-actions button.liked:hover { color: var(--danger); }
  .mp-now-actions button.added { color: var(--accent); }

  .mp-songs-pull {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 12px 0 18px; color: var(--ink-faint); font-family: var(--font-mono);
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; background: none; border: none; cursor: pointer; width: 100%;
  }

  /* ---------- Mini player ---------- */

  .mp-miniplayer {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 11px;
    margin: 0 10px 8px; padding: 8px 10px;
    background: linear-gradient(135deg, rgba(10,10,12,0.97), rgba(20,16,8,0.97));
    border-radius: 14px;
    box-shadow: 0 10px 24px -8px rgba(0,0,0,0.4);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .mp-miniplayer.hidden { display: none; }
  .mp-miniplayer::before {
    content: ""; position: absolute; inset: 0;
    background: var(--mini-bg-image, none);
    background-size: cover; background-position: center;
    opacity: 0.35; filter: blur(2px) saturate(1.3);
    transform: scale(1.15);
  }
  .mp-mini-art {
    width: 38px; height: 38px; border-radius: 9px; flex-shrink: 0;
    background-size: cover; background-position: center;
    position: relative; z-index: 1;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .mp-mini-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
  .mp-mini-title {
    font-size: 13.5px; font-weight: 700; color: #fff; margin: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mp-mini-artist {
    font-size: 11.5px; font-weight: 600; color: rgba(255,255,255,0.65); margin: 2px 0 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mp-mini-btn {
    background: none; border: none; color: rgba(255,255,255,0.9); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 7px; flex-shrink: 0; position: relative; z-index: 1;
  }
  .mp-mini-btn:hover { color: #fff; }
  .mp-mini-play {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--gold) !important; color: #0a0a0c !important;
  }
  .mp-mini-play:hover { background: #e0922a !important; }

  /* ---------- Bottom nav ---------- */

  .mp-bottom-nav {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-around;
    padding: 12px 6px calc(10px + env(safe-area-inset-bottom)); background: #000000;
  }
  .mp-bottom-nav.hidden { display: none; }
  .mp-nav-btn {
    background: none; border: none; color: rgba(255,255,255,0.55); cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 5px; padding: 4px 6px; flex: 1; font-size: 11px; font-weight: 700;
  }
  .mp-nav-btn.active { color: #ffffff; }
  .mp-nav-btn svg { stroke: currentColor; }
  .mp-nav-btn.active svg { fill: currentColor; }

  /* ---------- Install banner ---------- */

  .mp-install-banner {
    display: flex; align-items: center; gap: 10px;
    margin: 16px 22px 0; padding: 11px 12px;
    background: var(--ink); border-radius: 14px; color: #fff;
  }
  .mp-install-banner.hidden { display: none; }
  .mp-install-icon {
    width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
    background: rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
  }
  .mp-install-text { flex: 1; min-width: 0; }
  .mp-install-title { font-size: 13.5px; font-weight: 800; margin: 0; }
  .mp-install-sub { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.6); margin: 1px 0 0; }
  .mp-install-btn {
    background: var(--gold); color: #0a0a0c; border: none; border-radius: 18px;
    padding: 7px 14px; font-size: 12.5px; font-weight: 800; cursor: pointer; flex-shrink: 0;
  }
  .mp-install-dismiss {
    background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer;
    padding: 4px; flex-shrink: 0;
  }
  .mp-install-dismiss:hover { color: #fff; }

  /* ---------- Action sheet ---------- */

  .mp-sheet-backdrop {
    position: absolute; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 60; opacity: 0; transition: opacity 0.2s ease;
  }
  .mp-sheet-backdrop.hidden { display: none; }
  .mp-sheet-backdrop.show { opacity: 1; }

  .mp-sheet {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: var(--surface); border-radius: 22px 22px 0 0;
    padding: 10px 18px calc(20px + env(safe-area-inset-bottom));
    z-index: 61;
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: 0 -10px 40px rgba(0,0,0,0.25);
  }
  .mp-sheet.hidden { display: none; }
  .mp-sheet.show { transform: translateY(0); }

  .mp-sheet-handle {
    width: 36px; height: 4px; border-radius: 4px; background: var(--line);
    margin: 6px auto 14px;
  }
  .mp-sheet-option {
    display: flex; align-items: center; gap: 14px; width: 100%;
    background: none; border: none; cursor: pointer; text-align: left;
    padding: 12px 4px;
  }
  .mp-sheet-icon {
    width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
    background: var(--bg); border: 1.5px solid var(--line);
    display: flex; align-items: center; justify-content: center; color: var(--ink);
  }
  .mp-sheet-title { font-size: 15px; font-weight: 700; color: var(--ink); margin: 0; }
  .mp-sheet-sub { font-size: 12.5px; font-weight: 600; color: var(--ink-faint); margin: 2px 0 0; }

  /* ---------- Upload progress overlay ---------- */

  .mp-upload-overlay {
    position: absolute; inset: 0; background: rgba(10,10,12,0.55);
    z-index: 70; display: flex; align-items: center; justify-content: center;
    padding: 0 32px;
  }
  .mp-upload-overlay.hidden { display: none; }
  .mp-upload-card {
    background: var(--surface); border-radius: 18px; padding: 22px;
    width: 100%; max-width: 280px;
  }
  .mp-upload-title { font-family: var(--font-display); font-weight: 800; font-size: 16px; color: var(--ink); margin: 0 0 14px; }
  .mp-upload-bar { width: 100%; height: 8px; border-radius: 8px; background: var(--line); overflow: hidden; }
  .mp-upload-bar-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 8px; transition: width 0.2s ease; }
  .mp-upload-sub { font-family: var(--font-mono); font-size: 11.5px; font-weight: 700; color: var(--ink-faint); margin: 10px 0 0; }

  /* ---------- Toast ---------- */

  .mp-toast {
    position: absolute; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--ink); color: #fff; font-size: 13.5px; font-weight: 700;
    padding: 11px 18px; border-radius: 30px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease; white-space: nowrap; z-index: 50;
    max-width: 85%; overflow: hidden; text-overflow: ellipsis;
  }
  .mp-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  svg { display: block; }
  .hidden { display: none; }

  @media (prefers-reduced-motion: reduce) {
    .mp-mini-eq span, .mp-waveform span { animation: none !important; transition: none !important; }
  }
</style>

<body>

<audio id="audioEl" preload="metadata"></audio>

<div class="mp-phone">

  <!-- ============ DISCOVER SCREEN ============ -->
  <div class="mp-screen" id="screen-discover">
    <div class="mp-discover-header">
      <div class="mp-discover-top">
        <h1 class="mp-topbar-title">Audiq</h1>
        <button class="mp-icon-btn" id="goSearchBtn" aria-label="Search">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
      <div class="mp-tabs" id="tabs">
        <button class="mp-tab active" data-tab="Overview">Overview</button>
        <button class="mp-tab" data-tab="Songs">Songs</button>
        <button class="mp-tab" data-tab="Albums">Albums</button>
        <button class="mp-tab" data-tab="Artists">Artists</button>
        <button class="mp-tab" data-tab="Online">Online</button>
      </div>
    </div>

    <div class="mp-install-banner hidden" id="installBanner">
      <div class="mp-install-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>
      <div class="mp-install-text">
        <p class="mp-install-title">Install Audiq</p>
        <p class="mp-install-sub">Your music. Your world. Install now.</p>
      </div>
      <button class="mp-install-btn" id="installBtn">Install</button>
      <button class="mp-install-dismiss" id="installDismissBtn" aria-label="Dismiss">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="mp-scroll" id="discoverContent">
      <div id="discoverOverview">
        <h2 class="mp-section-title">Popular This Week</h2>
        <div class="mp-popular-row" id="popularRow"></div>

        <h2 class="mp-section-title">Top Songs</h2>
        <div class="mp-track-list" id="trackList"></div>
      </div>
    </div>
  </div>

  <!-- ============ SEARCH SCREEN ============ -->
  <div class="mp-screen hidden" id="screen-search">
    <div class="mp-topbar">
      <h1 class="mp-topbar-title">Search</h1>
    </div>
    <div class="mp-search-box">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Song, artist, or album" autocomplete="off" />
      <button class="mp-search-clear hidden" id="searchClearBtn" aria-label="Clear search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="mp-scroll" id="searchResults"></div>
  </div>

  <!-- ============ LIBRARY SCREEN ============ -->
  <div class="mp-screen hidden" id="screen-library">
    <div class="mp-topbar">
      <h1 class="mp-topbar-title">Your Library</h1>
      <button class="mp-icon-btn" id="libCreateBtn" aria-label="Create playlist">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="mp-lib-tabs" id="libTabs">
      <button class="mp-lib-tab active" data-libtab="playlists">Playlists</button>
      <button class="mp-lib-tab" data-libtab="favorites">Favorites</button>
      <button class="mp-lib-tab" data-libtab="liked">Liked</button>
    </div>
    <div class="mp-scroll" id="libraryContent"></div>
  </div>

  <!-- ============ CREATE / EDIT PLAYLIST SCREEN ============ -->
  <div class="mp-screen hidden" id="screen-create">
    <div class="mp-topbar">
      <button class="mp-icon-btn" id="createBackBtn" aria-label="Back">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 class="mp-topbar-title" style="font-size:18px;" id="createScreenTitle">New Playlist</h1>
      <span style="width:38px;"></span>
    </div>
    <div class="mp-create-name">
      <input type="text" id="playlistNameInput" placeholder="Playlist name" maxlength="40" />
    </div>
    <p class="mp-create-sub">Add songs</p>
    <div class="mp-scroll" id="createTrackList" style="padding-top:0;"></div>
    <div class="mp-create-footer">
      <button class="mp-btn-primary" id="savePlaylistBtn" disabled>Save playlist</button>
    </div>
  </div>

  <!-- ============ PLAYLIST DETAIL SCREEN ============ -->
  <div class="mp-screen hidden" id="screen-playlist-detail">
    <div class="mp-pd-header">
      <div class="mp-pd-toprow">
        <button class="mp-icon-btn" id="pdBackBtn" aria-label="Back">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="mp-icon-btn" id="pdEditBtn" aria-label="Edit playlist">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
      <div class="mp-pd-cover" id="pdCover"></div>
      <div>
        <h2 class="mp-pd-title" id="pdTitle"></h2>
        <p class="mp-pd-meta" id="pdMeta"></p>
      </div>
      <div class="mp-pd-controls">
        <button class="mp-pd-play-btn" id="pdPlayBtn" aria-label="Play playlist">

  var POPULAR_IDS = [3, 4, 0, 2];

  var STORAGE_KEY = "mp_state_v1";

  var storageAvailable = true;
  try {
    localStorage.setItem("__mp_test__", "1");
    localStorage.removeItem("__mp_test__");
  } catch (e) {
    storageAvailable = false;
  }

  function loadState() {
    var fallback = { favorites: [], liked: [], playlists: [], uploaded: [] };
    if (!storageAvailable) return fallback;
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return fallback;
      var parsed = JSON.parse(raw);
      return {
        favorites: Array.isArray(parsed.favorites) ? parsed.favorites : [],
        liked: Array.isArray(parsed.liked) ? parsed.liked : [],
        playlists: Array.isArray(parsed.playlists) ? parsed.playlists : [],
        uploaded: Array.isArray(parsed.uploaded) ? parsed.uploaded : []
      };
    } catch (e) {
      return fallback;
    }
  }

  function saveState() {
    if (!storageAvailable) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        favorites: Array.from(favorites),
        liked: Array.from(liked),
        playlists: playlists,
        uploaded: TRACKS.filter(function (t) { return t.uploaded; }).map(function (t) {
          return { id: t.id, title: t.title, artist: t.artist, album: t.album, duration: t.duration };
        })
      }));
    } catch (e) {}
  }

  var persisted = loadState();
  var favorites = new Set(persisted.favorites);
  var liked = new Set(persisted.liked);
  var playlists = persisted.playlists;
  var nextPlaylistId = playlists.reduce(function (max, p) { return Math.max(max, p.id); }, 0) + 1;

  // =========================================================================
  // IndexedDB: stores the actual uploaded audio file blobs (localStorage
  // can't hold file data). Metadata for uploaded tracks lives alongside the
  // rest of the app state in localStorage so search/library/playlists all
  // treat uploaded tracks the same as the demo ones.
  // =========================================================================
  var DB_NAME = "mp_audio_db";
  var DB_STORE = "files";
  var dbPromise = null;

  function openDb() {
    if (dbPromise) return dbPromise;
    dbPromise = new Promise(function (resolve, reject) {
      if (!window.indexedDB) { resolve(null); return; }
      var req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = function () {
        req.result.createObjectStore(DB_STORE);
      };
      req.onsuccess = function () { resolve(req.result); };
      req.onerror = function () { resolve(null); };
    });
    return dbPromise;
  }

  function dbPutFile(key, blob) {
    return openDb().then(function (db) {
      if (!db) return false;
      return new Promise(function (resolve) {
        var tx = db.transaction(DB_STORE, "readwrite");
        tx.objectStore(DB_STORE).put(blob, key);
        tx.oncomplete = function () { resolve(true); };
        tx.onerror = function () { resolve(false); };
      });
    });
  }

  function dbGetFile(key) {
    return openDb().then(function (db) {
      if (!db) return null;
      return new Promise(function (resolve) {
        var tx = db.transaction(DB_STORE, "readonly");
        var req = tx.objectStore(DB_STORE).get(key);
        req.onsuccess = function () { resolve(req.result || null); };
        req.onerror = function () { resolve(null); };
      });
    });
  }

  function dbDeleteFile(key) {
    return openDb().then(function (db) {
      if (!db) return false;
      return new Promise(function (resolve) {
        var tx = db.transaction(DB_STORE, "readwrite");
        tx.objectStore(DB_STORE).delete(key);
        tx.oncomplete = function () { resolve(true); };
        tx.onerror = function () { resolve(false); };
      });
    });
  }

  // Uploaded track metadata persists in localStorage; nextUploadId continues
  // numbering after the 6 built-in demo tracks (ids 0-5) so everything stays
  // unique across the whole TRACKS array.
  var uploadedMeta = persisted.uploaded || [];
  var nextUploadId = uploadedMeta.reduce(function (max, t) { return Math.max(max, t.id); }, 5) + 1;

  uploadedMeta.forEach(function (meta) {

      id: meta.id,
      title: meta.title,
      artist: meta.artist,
      album: meta.album,
      plays: "0",
      file: null,            // resolved lazily from IndexedDB on first play

  function trackById(id) {
    for (var i = 0; i < TRACKS.length; i++) { if (TRACKS[i].id === id) return TRACKS[i]; }
    return null;
  }

  function formatTime(sec) {
    if (!sec || isNaN(sec) || !isFinite(sec)) return "0:00";
    var m = Math.floor(sec / 60);
    var s = Math.floor(sec % 60);
    return m + ":" + (s < 10 ? "0" + s : s);
  }

  function waveformHeights(seed, count) {
    var s = seed * 9301 + 49297;
    var out = [];
    for (var i = 0; i < count; i++) {
      s = (s * 9301 + 49297) % 233280;
      out.push(6 + (s / 233280) * 26);
    }
    return out;
  }

  function gradient(art) { return "linear-gradient(135deg, " + art[0] + ", " + art[1] + ")"; }
  function coverStyle(t) {
    if (t.coverUrl) return "background-image:url(" + t.coverUrl + ");background-size:cover;background-position:center;";
    return "background:" + gradient(t.art) + ";";
  }

  function quadGradientHTML(trackIds) {
    var ids = trackIds.slice(0, 4);
    if (ids.length === 0) return null;
    return ids.map(function (id) {
      var t = trackById(id);
      return '<span style="' + coverStyle(t) + '"></span>';
    }).join("");
  }

  var toastTimer = null;
  function showToast(msg) {
    var toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.classList.remove("show"); }, 1800);
  }

  var SCREENS = ["discover", "search", "library", "create", "playlist-detail", "player"];
  function showScreen(name) {
    SCREENS.forEach(function (s) {
      document.getElementById("screen-" + s).classList.toggle("hidden", s !== name);
    });
    var navHidden = name === "player" || name === "create" || name === "playlist-detail";
    document.getElementById("bottomNav").classList.toggle("hidden", navHidden);
    document.querySelectorAll(".mp-nav-btn").forEach(function (b) {
      b.classList.toggle("active", b.dataset.nav === name);
    });
    if (name === "discover") renderDiscoverContent();
    if (name === "search") renderSearchResults();
    if (name === "library") renderLibrary();
    if (name === "player") renderNowPlaying();
    if (name === "playlist-detail") renderPlaylistDetail();
    updateMiniPlayer();
  }

  var hasPlayedOnce = false;

  function updateMiniPlayer() {
    var mp = document.getElementById("miniPlayer");
    var screenName = SCREENS.find(function (s) { return !document.getElementById("screen-" + s).classList.contains("hidden"); });
    var shouldShow = hasPlayedOnce && screenName !== "player" && screenName !== "create" && screenName !== "playlist-detail";
    mp.classList.toggle("hidden", !shouldShow);
    if (!shouldShow) return;

    var t = trackById(currentIndex);
    document.getElementById("miniArt").style.cssText = coverStyle(t);
    mp.style.setProperty("--mini-bg-image", t.coverUrl ? "url(" + t.coverUrl + ")" : "none");
    document.getElementById("miniTitle").textContent = t.title;
    document.getElementById("miniArtist").textContent = t.artist;
    var icon = document.getElementById("miniPlayIcon");
    icon.innerHTML = isPlaying
      ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
      : '<polygon points="5 3 19 12 5 21 5 3"/>';
  }

  function renderPopular() {
    var row = document.getElementById("popularRow");
    if (!row) return;
    row.innerHTML = "";
    POPULAR_IDS.forEach(function (id) {
      var t = trackById(id);
      var card = document.createElement("button");
      card.className = "mp-popular-card";
      card.style.cssText += coverStyle(t);
      card.innerHTML =
        '<p class="mp-popular-name">' + t.title + '</p>' +
        '<div class="mp-popular-meta">' +
          '<span class="mp-popular-stats">' + formatTime(t.duration) + '</span>' +
          '<span class="mp-popular-play"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></span>' +
        '</div>';
      card.addEventListener("click", function () { openTrack(id, null, null); });
      row.appendChild(card);
    });
  }

    if (activeDiscoverTab === "Online") {
      renderOnlineTab();
      if (jamendoConfigured() && onlineResults.length === 0 && !onlineLoading && !onlineError) {
        searchJamendo("");
      }
      return;

  // Online tab: search and stream from Jamendo (legal, royalty-free catalog)
  // =========================================================================
  var onlineResults = [];
  var onlineQuery = "";
  var onlineLoading = false;
  var onlineError = null;

  function jamendoConfigured() {
    return JAMENDO_CLIENT_ID && JAMENDO_CLIENT_ID !== "YOUR_CLIENT_ID_HERE";
  }

  function searchJamendo(query) {
    onlineLoading = true;
    onlineError = null;
    renderOnlineTab();

    var url = JAMENDO_BASE + "/tracks/?client_id=" + encodeURIComponent(JAMENDO_CLIENT_ID) +
      "&format=json&limit=20&imagesize=300" +
      (query ? "&search=" + encodeURIComponent(query) : "&order=popularity_total&boost=popularity_total");

    fetch(url)
      .then(function (res) {
        if (!res.ok) throw new Error("Request failed (" + res.status + ")");
        return res.json();
      })
      .then(function (data) {
        onlineLoading = false;
        if (!data.results || data.results.length === 0) {
          onlineResults = [];
          onlineError = query ? "No results for \"" + query + "\"" : "No tracks found";
        } else {
          onlineResults = data.results.map(function (r) {
            return {
              jamendoId: r.id,
              title: r.name || "Untitled",
              artist: r.artist_name || "Unknown Artist",
              album: r.album_name || "Single",
              duration: r.duration || 0,
              audioUrl: r.audio,
              imageUrl: r.image || r.album_image || null
            };
          }).filter(function (t) { return !!t.audioUrl; });
        }
        renderOnlineTab();
      })
      .catch(function (err) {
        onlineLoading = false;
        onlineError = "Couldn't reach Jamendo. Check your connection or client_id.";
        renderOnlineTab();
      });
  }

    var container = document.getElementById("discoverContent");

        '<input type="text" id="onlineSearchInput" placeholder="Search artist, song, or genre" value="' + onlineQuery.replace(/"/g, "&quot;") + '" />' +

    if (!jamendoConfigured()) {
      area.innerHTML = '<p class="mp-empty-state"><strong>Setup needed</strong>Add your free Jamendo client_id near the top of the script (look for JAMENDO_CLIENT_ID) to turn this on. Takes about a minute at devportal.jamendo.com.</p>';

    }

    if (onlineLoading) {

      return;
    }

    if (onlineError) {
      area.innerHTML = '<p class="mp-empty-state"><strong>' + onlineError + '</strong>Try a different search term.</p>';

    if (onlineResults.length === 0) {

      row.innerHTML =

  function ensureOnlineTrackInLibrary(r) {
    // Give the Jamendo track a stable negative-space id range so it never
    // collides with demo (0-5) or uploaded (6+) track ids.
    var existing = TRACKS.find(function (t) { return t.jamendoId === r.jamendoId; });
    if (existing) return existing;
    var id = "online_" + r.jamendoId;
    var track = {
      id: id, title: r.title, artist: r.artist, album: r.album,
      plays: "—", file: r.audioUrl, dbKey: null,
      art: ART[TRACKS.length % ART.length], coverUrl: r.imageUrl || null,
      duration: r.duration, uploaded: false, online: true, jamendoId: r.jamendoId
    };
    TRACKS.push(track);
    return track;
  }

  function playOnlineTrack(r, queueResults) {
    var track = ensureOnlineTrackInLibrary(r);
    var queueIds = (queueResults || [r]).map(function (item) {
      return ensureOnlineTrackInLibrary(item).id;

    openTrack(track.id, queueIds, "Online");
  }

  // =========================================================================
  // Upload pipeline
  // =========================================================================
  function readAudioDuration(file) {
    return new Promise(function (resolve) {
      var url = URL.createObjectURL(file);
      var probe = document.createElement("audio");
      probe.preload = "metadata";
      probe.src = url;
      var settle = function (val) {
        URL.revokeObjectURL(url);
        resolve(val);
      };
      probe.addEventListener("loadedmetadata", function () { settle(probe.duration || 0); });
      probe.addEventListener("error", function () { settle(0); });
      setTimeout(function () { settle(0); }, 8000); // safety timeout
    });
  }

  function guessTitleArtist(filename) {
    var base = filename.replace(/\.[^/.]+$/, ""); // strip extension
    var parts = base.split(" - ");
    if (parts.length >= 2) {
      return { artist: parts[0].trim(), title: parts.slice(1).join(" - ").trim() };
    }
    return { artist: "Unknown Artist", title: base.trim() || "Untitled" };
  }

  function handleFilesSelected(fileList) {
    var files = Array.prototype.filter.call(fileList, function (f) {
      return f.type.indexOf("audio") === 0 || /\.(mp3|wav|m4a|ogg|flac|aac)$/i.test(f.name);
    });
    if (files.length === 0) {
      showToast("No audio files found in that selection");
      return;
    }

    var overlay = document.getElementById("uploadOverlay");
    var barFill = document.getElementById("uploadBarFill");
    var sub = document.getElementById("uploadSub");
    var titleEl = document.getElementById("uploadTitle");
    titleEl.textContent = files.length === 1 ? "Adding song…" : "Adding " + files.length + " songs…";
    overlay.classList.remove("hidden");
    barFill.style.width = "0%";
    sub.textContent = "0 of " + files.length;

    var done = 0;
    var added = [];

    function processNext(i) {
      if (i >= files.length) {
        overlay.classList.add("hidden");
        saveState();
        showToast(added.length + " song" + (added.length === 1 ? "" : "s") + " added");
        renderDiscoverContent();
        if (!document.getElementById("screen-library").classList.contains("hidden")) renderLibrary();
        if (!document.getElementById("screen-search").classList.contains("hidden")) renderSearchResults();
        return;
      }
      var file = files[i];
      readAudioDuration(file).then(function (duration) {
        var guess = guessTitleArtist(file.name);
        var id = nextUploadId++;
        var dbKey = "track_" + id;
        return dbPutFile(dbKey, file).then(function (ok) {
          if (ok) {
            var track = {
              id: id, title: guess.title, artist: guess.artist, album: "Uploaded",
              plays: "0", file: null, dbKey: dbKey,
              art: ART[id % ART.length], coverUrl: null,
              duration: duration, uploaded: true
            };
            TRACKS.push(track);
            added.push(track);
          } else {
            showToast("Couldn't save \"" + file.name + "\"");
          }
          done++;
          barFill.style.width = Math.round((done / files.length) * 100) + "%";
          sub.textContent = done + " of " + files.length;
          processNext(i + 1);
        });
      });
    }

    processNext(0);
  }

  function openTrack(id, queueIds, queueLabel) {
    activeQueue = queueIds && queueIds.length ? queueIds : null;
    activeQueueLabel = queueLabel || null;
    loadTrack(id);
    play();
    showScreen("player");
  }

  function currentQueue() {
    return (activeQueue && activeQueue.length) ? activeQueue : TRACKS.map(function (t) { return t.id; });
  }

  var objectUrlCache = {}; // dbKey -> blob: URL, so we don't re-read IndexedDB every time

  function loadTrack(id) {
    currentIndex = id;
    var t = trackById(id);

    if (!t.uploaded) {
      audio.src = t.file;
      return;
    }

    if (objectUrlCache[t.dbKey]) {
      audio.src = objectUrlCache[t.dbKey];
      return;
    }

    // Uploaded track: fetch the blob from IndexedDB, then assign it.
    // Guard against the user skipping to a different track before this resolves.
    audio.removeAttribute("src");
    var requestedId = id;
    dbGetFile(t.dbKey).then(function (blob) {
      if (currentIndex !== requestedId) return; // user moved on already
      if (!blob) { showToast("Couldn't load \"" + t.title + "\""); return; }
      var url = URL.createObjectURL(blob);
      objectUrlCache[t.dbKey] = url;
      audio.src = url;
      if (isPlaying) audio.play().catch(function () {});
    });
  }

  function play() {
    audio.play().catch(function () {});
    isPlaying = true;
    hasPlayedOnce = true;
    updatePlayIcon();
    startWaveformAnimation();
    updateMiniPlayer();
  }

  function pause() {
    audio.pause();
    isPlaying = false;
    updatePlayIcon();
    stopWaveformAnimation();
    updateMiniPlayer();
  }

  function togglePlay() { isPlaying ? pause() : play(); }

  function stepTrack(direction) {
    var queue = currentQueue();
    var nextId;
    if (shuffleOn) {
      if (queue.length === 1) {
        nextId = queue[0];
      } else {
        do {
          nextId = queue[Math.floor(Math.random() * queue.length)];
        } while (nextId === currentIndex);
      }
    } else {
      var pos = queue.indexOf(currentIndex);
      var safePos = pos === -1 ? 0 : pos;
      var nextPos = (safePos + direction + queue.length) % queue.length;
      nextId = queue[nextPos];
    }
    loadTrack(nextId);
    play();
    renderNowPlaying();
  }

  function prevTrack() { stepTrack(-1); }
  function nextTrack() { stepTrack(1); }

  function toggleShuffle() {
    shuffleOn = !shuffleOn;
    document.getElementById("shuffleBtn").classList.toggle("active", shuffleOn);
    showToast(shuffleOn ? "Shuffle on" : "Shuffle off");
  }

  function renderWaveform() {
    var wf = document.getElementById("waveform");
    wf.innerHTML = "";
    var heights = waveformHeights(currentIndex + 1, BAR_COUNT);
    heights.forEach(function (h) {
      var bar = document.createElement("span");
      bar.style.height = h + "px";
      wf.appendChild(bar);
    });
  }

  var waveAnimFrame = null;
  var waveAnimTick = 0;

  function updateWaveformFill() {
    var t = trackById(currentIndex);
    var duration = audio.duration || t.duration;
    var pct = duration > 0 ? (audio.currentTime / duration) * 100 : 0;
    var filledBars = Math.round((pct / 100) * BAR_COUNT);
    var bars = document.querySelectorAll("#waveform span");
    bars.forEach(function (bar, i) { bar.classList.toggle("filled", i < filledBars); });
    return filledBars;
  }

  function startWaveformAnimation() {
    stopWaveformAnimation();
    function tick() {
      var filledBars = updateWaveformFill();
      var allBars = document.querySelectorAll("#waveform span");
      allBars.forEach(function (bar) { bar.classList.remove("live"); });
      for (var k = 0; k < 3; k++) {
        var idx = filledBars + k;
        if (allBars[idx]) {
          var phase = (waveAnimTick + k * 2) % 6;
          if (phase < 3) allBars[idx].classList.add("live");
        }
      }
      waveAnimTick++;
      waveAnimFrame = requestAnimationFrame(tick);
    }
    tick();
  }

  function stopWaveformAnimation() {
    if (waveAnimFrame) {
      cancelAnimationFrame(waveAnimFrame);
      waveAnimFrame = null;
    }
    document.querySelectorAll("#waveform span.live").forEach(function (b) { b.classList.remove("live"); });
  }

  function renderNowPlaying() {
    var t = trackById(currentIndex);
    document.getElementById("cover").style.cssText = "background:#eee;" + coverStyle(t);
    document.getElementById("nowTitle").textContent = t.title;
    document.getElementById("nowArtist").textContent = t.artist;
    document.getElementById("curTime").textContent = formatTime(audio.currentTime);
    document.getElementById("durTime").textContent = formatTime(t.duration);
    renderWaveform();
    updateWaveformFill();
    updatePlayIcon();
    updateFavBtn();
    updateLikeBtnPlayer();
    document.getElementById("shuffleBtn").classList.toggle("active", shuffleOn);
    if (isPlaying) startWaveformAnimation();
  }

  function updatePlayIcon() {
    var icon = document.getElementById("playIcon");
    var btn = document.getElementById("playBtn");
    if (isPlaying) {
      icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      btn.setAttribute("aria-label", "Pause");
    } else {
      icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
      btn.setAttribute("aria-label", "Play");
    }
  }

  function updateFavBtn() {
    var btn = document.getElementById("favBtn");
    var isFav = favorites.has(currentIndex);
    btn.classList.toggle("liked", isFav);
    btn.querySelector("svg").setAttribute("fill", isFav ? "currentColor" : "none");
  }

  function updateLikeBtnPlayer() {
    var btn = document.getElementById("likeBtn");
    btn.classList.toggle("added", liked.has(currentIndex));
  }

  audio.addEventListener("loadedmetadata", function () {
    trackById(currentIndex).duration = audio.duration;
    document.getElementById("durTime").textContent = formatTime(audio.duration);
    renderPopular();
  });

  audio.addEventListener("timeupdate", function () {
    document.getElementById("curTime").textContent = formatTime(audio.currentTime);
  });

  audio.addEventListener("ended", function () { nextTrack(); });

  document.getElementById("playBtn").addEventListener("click", togglePlay);

  document.getElementById("miniPlayBtn").addEventListener("click", function (e) {
    e.stopPropagation();
    togglePlay();
  });
  document.getElementById("miniPrevBtn").addEventListener("click", function (e) {
    e.stopPropagation();
    prevTrack();
  });
  document.getElementById("miniNextBtn").addEventListener("click", function (e) {
    e.stopPropagation();
    nextTrack();
  });
  document.getElementById("miniPlayer").addEventListener("click", function () {
    showScreen("player");
  });
  document.getElementById("prevBtn").addEventListener("click", prevTrack);
  document.getElementById("nextBtn").addEventListener("click", nextTrack);
  document.getElementById("shuffleBtn").addEventListener("click", toggleShuffle);
  document.getElementById("backBtn").addEventListener("click", function () { showScreen("discover"); });
  document.getElementById("songsPull").addEventListener("click", function () { showScreen("discover"); });
  document.getElementById("favBtn").addEventListener("click", function () {
    toggleFavorite(currentIndex);
    updateFavBtn();
    showToast(favorites.has(currentIndex) ? "Added to favorites" : "Removed from favorites");
  });
  document.getElementById("likeBtn").addEventListener("click", function () {
    toggleLiked(currentIndex);
    updateLikeBtnPlayer();
    showToast(liked.has(currentIndex) ? "Added to liked songs" : "Removed from liked songs");
  });
  document.getElementById("addToPlaylistBtn").addEventListener("click", function () { openAddToPlaylistPicker(currentIndex); });

  document.getElementById("waveform").addEventListener("click", function (e) {
    var wf = document.getElementById("waveform");
    var rect = wf.getBoundingClientRect();
    var ratio = (e.clientX - rect.left) / rect.width;
    ratio = Math.min(1, Math.max(0, ratio));
    var duration = audio.duration || trackById(currentIndex).duration;
    if (duration && isFinite(duration)) {
      audio.currentTime = ratio * duration;
      updateWaveformFill();
    } else {
      var seekWhenReady = function () {
        audio.currentTime = ratio * audio.duration;
        updateWaveformFill();
        audio.removeEventListener("loadedmetadata", seekWhenReady);
      };
      audio.addEventListener("loadedmetadata", seekWhenReady);
      if (audio.paused) play();
    }
  });

  document.getElementById("bottomNav").addEventListener("click", function (e) {
    var btn = e.target.closest(".mp-nav-btn");
    if (!btn) return;
    var dest = btn.dataset.nav;
    if (dest === "create") { openCreateSheet(); return; }
    showScreen(dest);
  });

  document.getElementById("tabs").addEventListener("click", function (e) {
    var btn = e.target.closest(".mp-tab");
    if (!btn) return;
    document.querySelectorAll(".mp-tab").forEach(function (b) { b.classList.remove("active"); });
    btn.classList.add("active");
    activeDiscoverTab = btn.dataset.tab;
    renderDiscoverContent();
  });
  document.getElementById("goSearchBtn").addEventListener("click", function () { showScreen("search"); });

  document.getElementById("searchInput").addEventListener("input", renderSearchResults);
  document.getElementById("searchClearBtn").addEventListener("click", function () {
    document.getElementById("searchInput").value = "";
    renderSearchResults();
    document.getElementById("searchInput").focus();
  });

  document.getElementById("libTabs").addEventListener("click", function (e) {
    var btn = e.target.closest(".mp-lib-tab");
    if (!btn) return;
    activeLibTab = btn.dataset.libtab;
    document.querySelectorAll(".mp-lib-tab").forEach(function (b) { b.classList.toggle("active", b === btn); });
    renderLibrary();
  });
  document.getElementById("libCreateBtn").addEventListener("click", openCreateSheet);

  document.getElementById("sheetBackdrop").addEventListener("click", closeCreateSheet);
  document.getElementById("sheetNewPlaylist").addEventListener("click", function () {
    closeCreateSheet();
    openCreateScreen(null);
  });
  document.getElementById("sheetUploadSongs").addEventListener("click", function () {
    closeCreateSheet();
    document.getElementById("fileInput").click();
  });
  document.getElementById("fileInput").addEventListener("change", function (e) {
    if (e.target.files && e.target.files.length) {
      handleFilesSelected(e.target.files);
    }
    e.target.value = ""; // allow re-selecting the same file later
  });

  document.getElementById("createBackBtn").addEventListener("click", function () { showScreen("library"); });
  document.getElementById("playlistNameInput").addEventListener("input", updateSaveButtonState);
  document.getElementById("savePlaylistBtn").addEventListener("click", savePlaylist);

  document.getElementById("pdBackBtn").addEventListener("click", function () { showScreen("library"); });
  document.getElementById("pdEditBtn").addEventListener("click", function () { openCreateScreen(viewingPlaylistId); });
  document.getElementById("pdPlayBtn").addEventListener("click", function () {
    var p = playlists.find(function (pl) { return pl.id === viewingPlaylistId; });
    if (!p || p.trackIds.length === 0) { showToast("Add songs to this playlist first"); return; }
    openTrack(p.trackIds[0], p.trackIds, p.name);
  });
  document.getElementById("pdShuffleBtn").addEventListener("click", function () {
    var p = playlists.find(function (pl) { return pl.id === viewingPlaylistId; });
    if (!p || p.trackIds.length === 0) { showToast("Add songs to this playlist first"); return; }
    shuffleOn = true;
    document.getElementById("pdShuffleBtn").classList.add("active");
    var randomId = p.trackIds[Math.floor(Math.random() * p.trackIds.length)];
    openTrack(randomId, p.trackIds, p.name);
  });

  function openAddToPlaylistPicker(trackId) {
    if (playlists.length === 0) {
      showToast("Create a playlist first");
      openCreateScreen(null);
      draftTrackIds.add(trackId);
      renderCreateTrackList();
      updateSaveButtonState();
      return;
    }
    showScreen("library");
    activeLibTab = "playlists";
    document.querySelectorAll(".mp-lib-tab").forEach(function (b) { b.classList.toggle("active", b.dataset.libtab === "playlists"); });
    renderLibrary();
    showToast("Open a playlist, then tap edit to add this song");
  }

  // =========================================================================
  // PWA install banner
  // =========================================================================
  var deferredInstallPrompt = null;

  window.addEventListener("beforeinstallprompt", function (e) {
    e.preventDefault();
    deferredInstallPrompt = e;
    if (!sessionStorage.getItem("mp_install_dismissed")) {
      document.getElementById("installBanner").classList.remove("hidden");
    }
  });

  document.getElementById("installBtn").addEventListener("click", function () {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then(function () {
      document.getElementById("installBanner").classList.add("hidden");
      deferredInstallPrompt = null;
    });
  });

  document.getElementById("installDismissBtn").addEventListener("click", function () {
    document.getElementById("installBanner").classList.add("hidden");
    try { sessionStorage.setItem("mp_install_dismissed", "1"); } catch (e) {}
  });

  window.addEventListener("appinstalled", function () {
    document.getElementById("installBanner").classList.add("hidden");
  });

  loadTrack(currentIndex);
  showScreen("discover");
})();
</script>

</body>
</html>
